<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Learnify Assignments</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0b0b12;
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.container{
display:flex;
gap:40px;
flex-wrap:wrap;
}

.panel{
border:2px solid #00f7ff;
border-radius:16px;
padding:20px;
min-width:320px;
box-shadow:0 0 12px #00f7ff;
}

button{
margin:6px;
padding:10px 18px;
border-radius:12px;
border:2px solid #00f7ff;
background:#05050a;
color:#00f7ff;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

input{
margin:4px;
padding:6px;
width:90%;
}

</style>
</head>

<body>

<div class="container">

<!-- TEACHER PANEL -->

<div class="panel">

<h3>Create Quiz</h3>

<input id="question" placeholder="Question"><br>

<input id="a1" placeholder="Answer 1">
<input id="a2" placeholder="Answer 2">
<input id="a3" placeholder="Answer 3">
<input id="a4" placeholder="Answer 4"><br>

<input id="correct" placeholder="Correct Answer (1-4)"><br>

<button onclick="addQuestion()">Add Question</button>
<button onclick="generateAIQuiz()">AI Generate Quiz</button>
<button onclick="assignQuiz()">Assign To Students</button>

<p id="assignmentCode"></p>

</div>

<!-- STUDENT PANEL -->

<div class="panel">

<h3>Student Join</h3>

<input id="joinCode" placeholder="Assignment Code">
<input id="studentName" placeholder="Your Name">

<button onclick="joinAssignment()">Start Quiz</button>

</div>

<!-- QUIZ PANEL -->

<div class="panel" id="quizPanel" style="display:none">

<h3 id="quizQuestion"></h3>

<div id="answers"></div>

<p id="score"></p>

</div>

</div>

<script>

let currentQuiz = [];
let questionIndex = 0;
let studentScore = 0;

/* CREATE QUIZ */

function addQuestion(){

let q = document.getElementById("question").value;

let answers = [
a1.value,
a2.value,
a3.value,
a4.value
];

let correctIndex = parseInt(correct.value) - 1;

currentQuiz.push({
question:q,
answers:answers,
correct:correctIndex
});

alert("Question added");

}

/* AI QUIZ GENERATOR */

class QuizGenerator{

static createQuestion(topic){

const types=["fact","thought","math"];
const type=types[Math.floor(Math.random()*types.length)];

if(type==="math"){
return this.mathQuestion();
}

if(type==="fact"){
return this.factQuestion(topic);
}

return this.thoughtQuestion(topic);

}

static mathQuestion(){

let n1=Math.floor(Math.random()*20)+1;
let n2=Math.floor(Math.random()*20)+1;

let correct=n1+n2;

let answers=[
correct,
correct+1,
correct-1,
correct+3
];

return{
question:`What is ${n1} + ${n2}?`,
answers:answers.map(a=>a.toString()),
correct:0
};

}

static factQuestion(topic){

return{
question:`Which statement about ${topic} is true?`,
answers:[
`${topic} is studied in schools`,
`${topic} is made of cheese`,
`${topic} lives underwater`,
`${topic} disappears every day`
],
correct:0
};

}

static thoughtQuestion(topic){

return{
question:`Why is ${topic} important?`,
answers:[
`${topic} helps people learn`,
`${topic} turns into gold`,
`${topic} controls gravity`,
`${topic} only exists in games`
],
correct:0
};

}

}

function generateAIQuiz(){

let topic=prompt("Enter topic");

currentQuiz=[];

for(let i=0;i<5;i++){
currentQuiz.push(QuizGenerator.createQuestion(topic));
}

alert("AI Quiz Generated");

}

/* ASSIGN QUIZ */

function assignQuiz(){

if(currentQuiz.length===0){
alert("Create a quiz first");
return;
}

let code=Math.random().toString(36).substring(2,8).toUpperCase();

localStorage.setItem("assignment_"+code,JSON.stringify(currentQuiz));

document.getElementById("assignmentCode").innerText="Assignment Code: "+code;

}

/* STUDENT JOIN */

function joinAssignment(){

let code=document.getElementById("joinCode").value;

let data=localStorage.getItem("assignment_"+code);

if(!data){
alert("Assignment not found");
return;
}

currentQuiz=JSON.parse(data);

questionIndex=0;
studentScore=0;

document.getElementById("quizPanel").style.display="block";

showQuestion();

}

/* SHOW QUESTIONS */

function showQuestion(){

if(questionIndex>=currentQuiz.length){

quizQuestion.innerText="Quiz Finished";

answers.innerHTML="";

score.innerText="Score: "+studentScore+" / "+currentQuiz.length;

return;

}

let q=currentQuiz[questionIndex];

quizQuestion.innerText=q.question;

answers.innerHTML="";

q.answers.forEach((a,i)=>{

let btn=document.createElement("button");

btn.innerText=a;

btn.onclick=function(){

if(i===q.correct){
studentScore++;
}

questionIndex++;

showQuestion();

};

answers.appendChild(btn);

});

}

</script>

</body>
</html>
